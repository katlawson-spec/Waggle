<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waggle — Rescue Dashboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #60a5fa;
      --row-hover: #273449;
      --header-bg: #111a2e;
    }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; margin: 0; background: var(--bg); color: var(--text); }
    header { padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); background: var(--card); }
    header h1 { margin: 0; font-size: 1.5rem; display: flex; align-items: center; gap: 0.6rem; }
    header h1 svg { width: 32px; height: 32px; color: var(--accent); transform-origin: 20% 80%; animation: wag 1.2s ease-in-out infinite; }
    @keyframes wag {
      0%, 100% { transform: rotate(-15deg); }
      50%      { transform: rotate(20deg); }
    }
    header .subtitle { color: var(--muted); font-size: 0.9rem; margin-top: 0.25rem; }
    main { padding: 1.5rem 2rem; }
    #status { color: var(--muted); font-size: 0.9rem; margin-bottom: 1rem; }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
    }
    .stat .label { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat .value { font-size: 1.75rem; font-weight: 600; margin-top: 0.25rem; color: var(--text); }

    h2 { font-size: 1.1rem; margin: 0 0 0.75rem 0; }
    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: auto; max-height: 70vh; }
    table { border-collapse: collapse; width: 100%; font-size: 0.9rem; }
    th, td { border-bottom: 1px solid var(--border); padding: 0.5rem 0.75rem; text-align: left; white-space: nowrap; }
    th { background: var(--header-bg); position: sticky; top: 0; font-weight: 600; }
    tr:hover td { background: var(--row-hover); }
  </style>
</head>
<body>
  <header>
    <h1>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 20 C 8 16, 10 14, 12 10 C 14 6, 18 4, 21 5 C 20 8, 18 10, 15 11 C 14 11.3, 13 11.5, 12 12"/>
      </svg>
      Waggle
    </h1>
    <div class="subtitle">Rescue dashboard — live from Dogs Master</div>
  </header>
  <main>
    <div id="status">Loading…</div>

    <section class="stats" id="stats" hidden>
      <div class="stat"><div class="label">Total dogs</div><div class="value" id="stat-total">—</div></div>
      <div class="stat"><div class="label">In foster</div><div class="value" id="stat-foster">—</div></div>
      <div class="stat"><div class="label">Medical hold</div><div class="value" id="stat-medical">—</div></div>
      <div class="stat"><div class="label">Adoption pending</div><div class="value" id="stat-pending">—</div></div>
      <div class="stat"><div class="label">Adopted</div><div class="value" id="stat-adopted">—</div></div>
      <div class="stat"><div class="label">Avg days in rescue</div><div class="value" id="stat-days">—</div></div>
      <div class="stat"><div class="label">Total adoption fees</div><div class="value" id="stat-fees">—</div></div>
    </section>

    <h2>Dogs Master</h2>
    <div class="table-wrap"><div id="table-container"></div></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT3MrIAddzbEoJPCkJ5AqaYwYRC0Hwr7E6vwtdJ-jfOdMH4mhB9RqVHMmEIXZ2QWVFG0q6O5v3dJt0N/pub?gid=1228898524&single=true&output=csv";

    const norm = (s) => (s ?? "").toString().trim().toLowerCase();
    const parseMoney = (s) => {
      if (s == null) return 0;
      const n = parseFloat(String(s).replace(/[^0-9.\-]/g, ""));
      return isNaN(n) ? 0 : n;
    };
    const parseNum = (s) => {
      const n = parseFloat(String(s ?? "").replace(/[^0-9.\-]/g, ""));
      return isNaN(n) ? null : n;
    };
    const fmtMoney = (n) => n.toLocaleString("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 });

    Papa.parse(CSV_URL, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: (results) => {
        const status = document.getElementById("status");
        const rows = results.data.filter((r) => norm(r["Dog ID"]));
        if (!rows.length) { status.textContent = "No rows found."; return; }

        let total = 0, foster = 0, medical = 0, pending = 0, adopted = 0;
        let daysSum = 0, daysCount = 0, feeSum = 0;

        for (const r of rows) {
          total++;
          const st = norm(r["Status"]);
          const medHold = norm(r["Medical Hold?"]) === "yes";

          if (st === "in foster") foster++;
          if (st === "medical hold" || medHold) medical++;
          if (st === "adoption pending") pending++;
          if (st === "adopted") adopted++;

          const d = parseNum(r["Days in Rescue"]);
          if (d !== null) { daysSum += d; daysCount++; }

          feeSum += parseMoney(r["Adoption Fee"]);
        }

        document.getElementById("stat-total").textContent = total;
        document.getElementById("stat-foster").textContent = foster;
        document.getElementById("stat-medical").textContent = medical;
        document.getElementById("stat-pending").textContent = pending;
        document.getElementById("stat-adopted").textContent = adopted;
        document.getElementById("stat-days").textContent = daysCount ? (daysSum / daysCount).toFixed(1) : "—";
        document.getElementById("stat-fees").textContent = fmtMoney(feeSum);
        document.getElementById("stats").hidden = false;

        const headers = results.meta.fields;
        const table = document.createElement("table");
        const thead = table.createTHead();
        const headerRow = thead.insertRow();
        headers.forEach((h) => {
          const th = document.createElement("th");
          th.textContent = h;
          headerRow.appendChild(th);
        });
        const tbody = table.createTBody();
        rows.forEach((row) => {
          const tr = tbody.insertRow();
          headers.forEach((h) => {
            const td = tr.insertCell();
            td.textContent = row[h] ?? "";
          });
        });
        document.getElementById("table-container").appendChild(table);
        status.textContent = `${rows.length} dogs loaded.`;
      },
      error: (err) => {
        document.getElementById("status").textContent = "Failed to load sheet: " + err.message;
      },
    });
  </script>
</body>
</html>
